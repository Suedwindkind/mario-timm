<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maurerbetrieb Mario Timm – mit Illustration Divider</title>

<style>
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: #2E3A45;
    text-align: center;
    padding: 10px 0;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    padding-top: 60px;
    color: #333;
}

header {
    background: #2E3A45;
    color: white;
    text-align: center;
    padding: 20px;
}

.header-logo img {
    width: min(96vw, 680px);
}

section {
    padding: 56px 20px;
    max-width: 900px;
    margin: auto;
}

h2 {
    text-align: center;
    color: #2E3A45;
}

/* Illustration Divider */
.section-divider {
    max-width: 900px;
    margin: 10px auto;
    padding: 0 20px;
}

.section-divider.mauer {
    height: 90px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 90'><g fill='none' stroke='%23222222' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'><rect x='10' y='10' width='160' height='30' rx='3'/><rect x='180' y='8' width='170' height='32' rx='3'/><rect x='360' y='10' width='160' height='30' rx='3'/><rect x='530' y='9' width='170' height='31' rx='3'/><rect x='710' y='10' width='170' height='30' rx='3'/><rect x='60' y='42' width='150' height='28' rx='3'/><rect x='220' y='44' width='170' height='26' rx='3'/><rect x='400' y='42' width='150' height='28' rx='3'/><rect x='560' y='44' width='170' height='26' rx='3'/><rect x='740' y='42' width='130' height='28' rx='3'/><path d='M30 20 l6 -2'/><path d='M200 25 l5 -2'/><path d='M420 22 l6 -2'/><path d='M600 24 l5 -2'/></g><g transform='rotate(-12 450 40)'><rect x='420' y='25' width='120' height='18' rx='3' fill='none' stroke='%23222222' stroke-width='1.4'/><rect x='535' y='22' width='30' height='24' rx='4' fill='none' stroke='%23222222' stroke-width='1.4'/></g></svg>");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.85;
}

</style>
</head>

<body>

<nav>
<a href="#ueber">Über mich</a>
<a href="#leistungen">Leistungen</a>
<a href="#arbeiten">Arbeiten</a>
<a href="#kontakt">Kontakt</a>
</nav>

<header>
<div class="header-logo">
<img src="bilder/logo.png" alt="Logo">
</div>
<h1>Zuverlässig · Professionell · Regional</h1>
</header>

<section id="ueber">
<h2>Über mich</h2>
<p>Ich bin Mario Timm, Maurer mit über 25 Jahren Erfahrung.</p>
</section>

<div class="section-divider mauer"></div>

<section id="leistungen">
<h2>Leistungen</h2>
<p>Inhalte…</p>
</section>

<div class="section-divider mauer"></div>

<section id="arbeiten">
<h2>Arbeiten</h2>
<p>Galerie…</p>
</section>

<div class="section-divider mauer"></div>

<section id="kontakt">
<h2>Kontakt</h2>
<p>Kontaktinfos…</p>
</section>

</body>
</html>
