<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maurerbetrieb Mario Timm – mit Zollstock Divider</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
}

section {
    padding:56px 20px;
    max-width:900px;
    margin:auto;
}

h2 {
    text-align:center;
}

/* Eleganter Zollstock Divider */
.section-divider {
    max-width:900px;
    margin:20px auto;
    padding:0 20px;
}

.section-divider.zollstock {
    height:26px;
    position:relative;
    opacity:0.85;
}

.section-divider.zollstock::before {
    content:"";
    display:block;
    height:8px;
    border-radius:4px;
    background:
    repeating-linear-gradient(
        to right,
        #f4e28a 0px,
        #f4e28a 20px,
        #2E3A45 20px,
        #2E3A45 22px
    );
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* feine Striche wie Maß-Markierungen */
.section-divider.zollstock::after {
    content:"";
    position:absolute;
    top:2px;
    left:20px;
    right:20px;
    height:16px;
    background:
    repeating-linear-gradient(
        to right,
        transparent 0px,
        transparent 9px,
        rgba(0,0,0,0.4) 9px,
        rgba(0,0,0,0.4) 10px
    );
    opacity:0.4;
}

@media (max-width:500px) {
    .section-divider.zollstock {
        height:22px;
    }
}
</style>
</head>

<body>

<section>
<h2>Über mich</h2>
<p>Inhalt...</p>
</section>

<div class="section-divider zollstock"></div>

<section>
<h2>Leistungen</h2>
<p>Inhalt...</p>
</section>

<div class="section-divider zollstock"></div>

<section>
<h2>Arbeiten</h2>
<p>Inhalt...</p>
</section>

<div class="section-divider zollstock"></div>

<section>
<h2>Kontakt</h2>
<p>Inhalt...</p>
</section>

</body>
</html>
